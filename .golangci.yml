version: "2"

linters:
  default: none
  enable:
    - errcheck
    - unused
    - staticcheck

issues:
  # Suppressed patterns: defer-cleanup and ResponseWriter writes are idiomatic Go.
  # Errors from Close/Shutdown/Write are unrecoverable in cleanup and HTTP contexts.
  exclude:
    - 'Error return value of `.*\.(Close|Shutdown|Restore).*` is not checked'
    - 'Error return value of `fmt\.F.*` is not checked'
    - 'Error return value of `.*\.Write.*` is not checked'
    - 'Error return value of `.*Encode.*` is not checked'

  exclude-rules:
    - linters: [errcheck]
      path: "_test\\.go"
    - linters: [unused]
      path: "_stub\\.go"
